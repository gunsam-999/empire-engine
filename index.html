<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b12" />
    <meta name="description" content="Empire Engine — build your industrial empire." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Empire" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Empire Engine</title>
    <style>
      html, body { margin: 0; background: #070b12; overflow: hidden; }

      /* ---- Boot splash ---- */
      #boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0;
        background: #070b12;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        animation: boot-fadein 0.5s ease both;
      }

      /* Particle field */
      #boot-particles {
        position: absolute; inset: 0; overflow: hidden; pointer-events: none;
      }
      .bp {
        position: absolute; border-radius: 50%;
        background: #5a4af2; opacity: 0;
        animation: bp-float linear infinite;
      }

      /* Studio ident */
      #boot-studio {
        font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
        color: #54607a; margin-bottom: 32px;
        animation: boot-studio-in 0.7s 0.3s ease both;
      }
      #boot-studio span { color: #7d6ff7; }

      /* Logo mark */
      #boot-mark {
        width: 88px; height: 88px; border-radius: 24px;
        display: grid; place-items: center;
        background: linear-gradient(145deg, #151c2e, #0e1420);
        border: 1.5px solid #5a4af2;
        box-shadow:
          0 0 0 1px rgba(90,74,242,0.25),
          0 0 40px -10px rgba(90,74,242,0.8),
          inset 0 1px 0 rgba(255,255,255,0.07);
        animation: boot-mark-in 0.6s 0.5s cubic-bezier(0.16,1,0.3,1) both,
                   boot-float 3.6s 1.2s ease-in-out infinite;
        overflow: hidden; position: relative;
      }
      /* Shimmer sweep over the icon */
      #boot-mark::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
        animation: boot-shimmer 2.8s 1.4s ease-in-out infinite;
      }
      #boot-mark svg { width: 64px; height: 64px; }

      /* Title */
      #boot-title {
        margin-top: 22px;
        font-size: 26px; font-weight: 900; letter-spacing: -0.02em;
        color: #e7ecf5;
        animation: boot-title-in 0.6s 0.75s cubic-bezier(0.16,1,0.3,1) both;
      }
      #boot-title em { font-style: normal; color: #7d6ff7; }

      /* Tagline */
      #boot-tagline {
        margin-top: 8px;
        font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
        color: #3d4a62;
        animation: boot-tagline-in 0.5s 1.1s ease both;
      }

      /* Progress bar track */
      #boot-bar-wrap {
        margin-top: 36px;
        width: 140px; height: 3px; border-radius: 999px;
        background: #141c2b; overflow: hidden;
        animation: boot-bar-in 0.4s 1.0s ease both;
      }
      #boot-bar {
        height: 100%; width: 45%; border-radius: 999px;
        background: linear-gradient(90deg, #4338ca, #7d6ff7, #a78bfa);
        animation: boot-slide 1.3s 1.0s ease-in-out infinite;
      }

      /* Loading hint */
      #boot-hint {
        margin-top: 12px;
        font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
        color: #2a3347;
        animation: boot-hint-in 0.4s 1.3s ease both;
      }

      /* ---- Keyframes ---- */
      @keyframes boot-fadein { from { opacity: 0; } to { opacity: 1; } }

      @keyframes bp-float {
        0%   { transform: translateY(110vh) scale(0.6); opacity: 0; }
        10%  { opacity: 0.18; }
        90%  { opacity: 0.08; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      @keyframes boot-studio-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes boot-mark-in {
        from { transform: scale(0.55) translateY(12px); opacity: 0; }
        to   { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes boot-float {
        0%,100% { transform: translateY(0px); }
        50%     { transform: translateY(-7px); }
      }
      @keyframes boot-shimmer {
        0%,100% { transform: translateX(-100%); }
        50%     { transform: translateX(100%); }
      }
      @keyframes boot-title-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes boot-tagline-in {
        from { opacity: 0; } to { opacity: 1; }
      }
      @keyframes boot-bar-in {
        from { opacity: 0; transform: scaleX(0.6); }
        to   { opacity: 1; transform: scaleX(1); }
      }
      @keyframes boot-slide {
        0%   { transform: translateX(-160%); }
        100% { transform: translateX(380%); }
      }
      @keyframes boot-hint-in {
        from { opacity: 0; } to { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .bp, #boot-mark, #boot-mark::after, #boot-bar { animation: none !important; }
        #boot-mark { transform: none; opacity: 1; }
        #boot-bar  { width: 60%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <!-- Floating particle field -->
        <div id="boot-particles">
          <div class="bp" style="left:8%;width:3px;height:3px;animation-duration:7s;animation-delay:0s;"></div>
          <div class="bp" style="left:19%;width:4px;height:4px;animation-duration:9s;animation-delay:-3s;"></div>
          <div class="bp" style="left:31%;width:2px;height:2px;animation-duration:11s;animation-delay:-1.5s;"></div>
          <div class="bp" style="left:44%;width:5px;height:5px;animation-duration:8s;animation-delay:-5s;"></div>
          <div class="bp" style="left:56%;width:3px;height:3px;animation-duration:10s;animation-delay:-2s;"></div>
          <div class="bp" style="left:67%;width:4px;height:4px;animation-duration:7.5s;animation-delay:-6s;"></div>
          <div class="bp" style="left:78%;width:2px;height:2px;animation-duration:12s;animation-delay:-0.8s;"></div>
          <div class="bp" style="left:88%;width:3px;height:3px;animation-duration:9.5s;animation-delay:-4s;"></div>
          <div class="bp" style="left:13%;width:2px;height:2px;animation-duration:13s;animation-delay:-7s;background:#a78bfa;"></div>
          <div class="bp" style="left:72%;width:4px;height:4px;animation-duration:8.5s;animation-delay:-2.5s;background:#38bdf8;"></div>
          <div class="bp" style="left:50%;width:2px;height:2px;animation-duration:10.5s;animation-delay:-9s;background:#34d399;"></div>
          <div class="bp" style="left:25%;width:3px;height:3px;animation-duration:6.5s;animation-delay:-4.5s;background:#f472b6;"></div>
        </div>

        <!-- RyNo Studios ident -->
        <div id="boot-studio"><span>RyNo</span> Studios</div>

        <!-- Icon mark -->
        <div id="boot-mark">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bi-cg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#b4a7fb"/>
                <stop offset="100%" stop-color="#4338ca"/>
              </linearGradient>
            </defs>
            <rect width="512" height="512" fill="transparent"/>
            <path d="M156,354 L156,268 L198,310 L230,210 L256,278 L282,210 L314,310 L356,268 L356,354 Z" fill="url(#bi-cg)"/>
            <rect x="142" y="344" width="228" height="42" rx="11" fill="#5a4af2"/>
            <circle cx="230" cy="206" r="13" fill="#f472b6"/>
            <circle cx="282" cy="206" r="13" fill="#fbbf24"/>
            <circle cx="256" cy="274" r="9" fill="#38bdf8"/>
          </svg>
        </div>

        <!-- Title -->
        <div id="boot-title"><em>Empire</em> Engine</div>

        <!-- Tagline -->
        <div id="boot-tagline">Build an industrial dynasty</div>

        <!-- Progress indicator -->
        <div id="boot-bar-wrap"><div id="boot-bar"></div></div>

        <!-- Loading hint -->
        <div id="boot-hint">Loading your empire&hellip;</div>
      </div>
    </div>
    <noscript>Empire Engine requires JavaScript to run. Please enable it in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

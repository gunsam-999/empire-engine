<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b12" />
    <meta name="description" content="Empire Engine — build your industrial empire." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Empire" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Empire Engine</title>
    <style>
      html, body { margin: 0; background: #070b12; }
      /* NOTE: no overflow:hidden — that breaks page scroll after boot. #boot is fixed-inset so it already covers the viewport. */

      /* ---- Boot splash ---- */
      #boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0;
        background: #060A14;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        animation: boot-fadein 0.5s ease both;
      }

      /* Particle field */
      #boot-particles {
        position: absolute; inset: 0; overflow: hidden; pointer-events: none;
      }
      .bp {
        position: absolute; border-radius: 50%;
        background: #F5C842; opacity: 0;
        animation: bp-float linear infinite;
      }

      /* Studio ident */
      #boot-studio {
        font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
        color: #3a4460; margin-bottom: 32px;
        animation: boot-studio-in 0.7s 0.3s ease both;
      }
      #boot-studio .ryno { color: #F5C842; font-weight: 700; }
      #boot-studio .studios { color: #6b7899; }

      /* Logo mark — circular medallion */
      #boot-mark {
        width: 88px; height: 88px; border-radius: 50%;
        display: grid; place-items: center;
        background: linear-gradient(145deg, #0A1525, #050A14);
        border: 2px solid rgba(245,200,66,0.55);
        box-shadow:
          0 0 0 1px rgba(245,200,66,0.12),
          0 0 48px -10px rgba(245,200,66,0.75),
          inset 0 1px 0 rgba(255,255,255,0.05);
        animation: boot-mark-in 0.6s 0.5s cubic-bezier(0.16,1,0.3,1) both,
                   boot-float 3.6s 1.2s ease-in-out infinite;
        overflow: hidden; position: relative;
      }
      #boot-mark::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
        animation: boot-shimmer 2.8s 1.4s ease-in-out infinite;
      }
      #boot-mark svg { width: 64px; height: 64px; }

      /* Title */
      #boot-title {
        margin-top: 22px;
        font-size: 26px; font-weight: 900; letter-spacing: -0.02em;
        font-family: 'Courier New', Consolas, monospace;
        text-transform: uppercase;
        animation: boot-title-in 0.6s 0.75s cubic-bezier(0.16,1,0.3,1) both;
      }
      #boot-title .empire { color: #F5C842; }
      #boot-title .engine { color: #4ECDC4; }

      /* Tagline */
      #boot-tagline {
        margin-top: 8px;
        font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
        color: #2a3550;
        animation: boot-tagline-in 0.5s 1.1s ease both;
      }

      /* Progress bar track */
      #boot-bar-wrap {
        margin-top: 36px;
        width: 180px; height: 3px; border-radius: 999px;
        background: rgba(78,205,196,0.12); overflow: hidden;
        animation: boot-bar-in 0.4s 1.0s ease both;
      }
      #boot-bar {
        height: 100%; width: 45%; border-radius: 999px;
        background: linear-gradient(90deg, #2A9D8F, #4ECDC4, #F5C842);
        animation: boot-slide 1.3s 1.0s ease-in-out infinite;
      }

      /* Loading hint */
      #boot-hint {
        margin-top: 12px;
        font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
        color: #2a3550;
        animation: boot-hint-in 0.4s 1.3s ease both;
      }

      /* ---- Keyframes ---- */
      @keyframes boot-fadein { from { opacity: 0; } to { opacity: 1; } }

      @keyframes bp-float {
        0%   { transform: translateY(110vh) scale(0.6); opacity: 0; }
        10%  { opacity: 0.18; }
        90%  { opacity: 0.08; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
      }

      @keyframes boot-studio-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes boot-mark-in {
        from { transform: scale(0.55) translateY(12px); opacity: 0; }
        to   { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes boot-float {
        0%,100% { transform: translateY(0px); }
        50%     { transform: translateY(-7px); }
      }
      @keyframes boot-shimmer {
        0%,100% { transform: translateX(-100%); }
        50%     { transform: translateX(100%); }
      }
      @keyframes boot-title-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes boot-tagline-in {
        from { opacity: 0; } to { opacity: 1; }
      }
      @keyframes boot-bar-in {
        from { opacity: 0; transform: scaleX(0.6); }
        to   { opacity: 1; transform: scaleX(1); }
      }
      @keyframes boot-slide {
        0%   { transform: translateX(-160%); }
        100% { transform: translateX(380%); }
      }
      @keyframes boot-hint-in {
        from { opacity: 0; } to { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .bp, #boot-mark, #boot-mark::after, #boot-bar { animation: none !important; }
        #boot-mark { transform: none; opacity: 1; }
        #boot-bar  { width: 60%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <!-- Floating particle field -->
        <div id="boot-particles">
          <div class="bp" style="left:8%;width:3px;height:3px;animation-duration:7s;animation-delay:0s;"></div>
          <div class="bp" style="left:19%;width:4px;height:4px;animation-duration:9s;animation-delay:-3s;"></div>
          <div class="bp" style="left:31%;width:2px;height:2px;animation-duration:11s;animation-delay:-1.5s;background:#4ECDC4;"></div>
          <div class="bp" style="left:44%;width:5px;height:5px;animation-duration:8s;animation-delay:-5s;"></div>
          <div class="bp" style="left:56%;width:3px;height:3px;animation-duration:10s;animation-delay:-2s;background:#C8890A;"></div>
          <div class="bp" style="left:67%;width:4px;height:4px;animation-duration:7.5s;animation-delay:-6s;background:#4ECDC4;"></div>
          <div class="bp" style="left:78%;width:2px;height:2px;animation-duration:12s;animation-delay:-0.8s;"></div>
          <div class="bp" style="left:88%;width:3px;height:3px;animation-duration:9.5s;animation-delay:-4s;"></div>
          <div class="bp" style="left:13%;width:2px;height:2px;animation-duration:13s;animation-delay:-7s;background:#2A9D8F;"></div>
          <div class="bp" style="left:72%;width:4px;height:4px;animation-duration:8.5s;animation-delay:-2.5s;background:#FFF4A3;"></div>
          <div class="bp" style="left:50%;width:2px;height:2px;animation-duration:10.5s;animation-delay:-9s;background:#4ECDC4;"></div>
          <div class="bp" style="left:25%;width:3px;height:3px;animation-duration:6.5s;animation-delay:-4.5s;background:#C8890A;"></div>
        </div>

        <!-- RyNo Studios ident -->
        <div id="boot-studio"><span class="ryno">RyNo</span> <span class="studios">Studios</span></div>

        <!-- Icon mark — circular medallion matching EmpireLogo -->
        <div id="boot-mark">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bi-tg" gradientUnits="userSpaceOnUse" x1="0" y1="150" x2="0" y2="42">
                <stop offset="0%" stop-color="#B87A0A"/>
                <stop offset="40%" stop-color="#F5C842"/>
                <stop offset="100%" stop-color="#FFF4A3"/>
              </linearGradient>
              <linearGradient id="bi-tb" gradientUnits="userSpaceOnUse" x1="0" y1="150" x2="0" y2="185">
                <stop offset="0%" stop-color="#2A9D8F" stop-opacity="0.92"/>
                <stop offset="100%" stop-color="#0C3D3A"/>
              </linearGradient>
              <linearGradient id="bi-rg" gradientUnits="userSpaceOnUse" x1="100" y1="14" x2="100" y2="186">
                <stop offset="0%" stop-color="#FFF4A3"/>
                <stop offset="45%" stop-color="#F5C842"/>
                <stop offset="100%" stop-color="#C8890A"/>
              </linearGradient>
              <linearGradient id="bi-tr" gradientUnits="userSpaceOnUse" x1="100" y1="155" x2="100" y2="190">
                <stop offset="0%" stop-color="#4ECDC4"/>
                <stop offset="100%" stop-color="#1E8A83"/>
              </linearGradient>
              <clipPath id="bi-cc"><circle cx="100" cy="100" r="80"/></clipPath>
            </defs>
            <circle cx="100" cy="100" r="93" fill="#04080F"/>
            <circle cx="100" cy="100" r="90" fill="#060C1A"/>
            <rect x="16" y="150" width="168" height="40" fill="url(#bi-tb)" clip-path="url(#bi-cc)"/>
            <g clip-path="url(#bi-cc)">
              <rect x="53"  y="97"  width="13" height="53" rx="1.5" fill="url(#bi-tg)"/>
              <rect x="69"  y="73"  width="15" height="77" rx="1.5" fill="url(#bi-tg)"/>
              <rect x="87"  y="46"  width="20" height="104" rx="2"  fill="url(#bi-tg)"/>
              <rect x="111" y="79"  width="14" height="71" rx="1.5" fill="url(#bi-tg)"/>
              <rect x="129" y="104" width="12" height="46" rx="1.5" fill="url(#bi-tg)"/>
            </g>
            <path d="M 39,161 A 86,86 0 1,0 161,161" fill="none" stroke="url(#bi-rg)" stroke-width="10" stroke-linecap="round"/>
            <path d="M 39,161 A 86,86 0 0,1 161,161" fill="none" stroke="url(#bi-tr)" stroke-width="10" stroke-linecap="round"/>
            <line x1="60" y1="150" x2="140" y2="150" stroke="#2A9D8F" stroke-width="1.5" opacity="0.65"/>
            <circle cx="75"  cy="150" r="2.5" fill="#4ECDC4" opacity="0.85"/>
            <circle cx="125" cy="150" r="2.5" fill="#4ECDC4" opacity="0.85"/>
            <circle cx="100" cy="150" r="5.5" fill="#F5C842" stroke="#2A9D8F" stroke-width="1.5"/>
            <circle cx="100" cy="150" r="2.5" fill="#FFF8D0"/>
          </svg>
        </div>

        <!-- Title -->
        <div id="boot-title"><span class="empire">EMPIRE</span> <span class="engine">ENGINE</span></div>

        <!-- Tagline -->
        <div id="boot-tagline">Build an industrial dynasty</div>

        <!-- Progress indicator -->
        <div id="boot-bar-wrap"><div id="boot-bar"></div></div>

        <!-- Loading hint -->
        <div id="boot-hint">Loading your empire&hellip;</div>
      </div>
    </div>
    <noscript>Empire Engine requires JavaScript to run. Please enable it in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

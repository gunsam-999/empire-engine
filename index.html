<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#070b12" />
    <meta name="description" content="Empire Engine — build your industrial empire." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Empire" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <title>Empire Engine</title>
    <style>
      /* Critical boot styles — paint an instant branded splash so there is no
         blank flash before the React bundle mounts. React replaces #root's
         children on first render, so this disappears automatically. */
      html, body { margin: 0; background: #070b12; }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background:
          radial-gradient(60% 50% at 50% 36%, rgba(90, 74, 242, 0.22), transparent 70%),
          #070b12;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #boot .mark {
        width: 76px; height: 76px; border-radius: 22px;
        display: grid; place-items: center;
        font-size: 40px;
        background: #0e1420;
        border: 1.5px solid #5a4af2;
        box-shadow: 0 0 0 1px rgba(90,74,242,0.3), 0 18px 50px -14px rgba(90,74,242,0.7);
        animation: boot-bob 1.8s ease-in-out infinite;
      }
      #boot .name {
        font-size: 15px; font-weight: 800; letter-spacing: 5px;
        color: #8a94a8; text-transform: uppercase;
      }
      #boot .bar {
        width: 132px; height: 4px; border-radius: 999px;
        background: #151c2b; overflow: hidden;
      }
      #boot .bar i {
        display: block; height: 100%; width: 40%; border-radius: 999px;
        background: linear-gradient(90deg, #7d6ff7, #5a4af2);
        animation: boot-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes boot-slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
      @media (prefers-reduced-motion: reduce) {
        #boot .mark, #boot .bar i { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="mark">🏛️</div>
        <div class="name">Empire Engine</div>
        <div class="bar"><i></i></div>
      </div>
    </div>
    <noscript>Empire Engine requires JavaScript to run. Please enable it in your browser.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

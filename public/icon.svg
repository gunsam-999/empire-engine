<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1c1545"/>
      <stop offset="100%" stop-color="#070b12"/>
    </radialGradient>
    <linearGradient id="crown-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b4a7fb"/>
      <stop offset="45%" stop-color="#7d6ff7"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="base-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7d6ff7"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#7d6ff7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5a4af2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg-glow)"/>
  <!-- Border ring -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#5a4af2" stroke-width="5" stroke-opacity="0.55"/>

  <!-- Ambient halo -->
  <ellipse cx="256" cy="240" rx="200" ry="180" fill="url(#halo)" filter="url(#soft)"/>

  <!-- Crown shadow for depth -->
  <path d="M156,354 L156,268 L198,310 L230,210 L256,278 L282,210 L314,310 L356,268 L356,354 Z"
        fill="#3730a3" opacity="0.6" transform="translate(4,8)" filter="url(#soft)"/>

  <!-- Crown body (5-point silhouette) -->
  <path d="M156,354 L156,268 L198,310 L230,210 L256,278 L282,210 L314,310 L356,268 L356,354 Z"
        fill="url(#crown-grad)" filter="url(#glow-f)"/>

  <!-- Crown inner bevel (lighter edge on left face) -->
  <path d="M156,268 L198,310 L230,210 L256,278" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.25" stroke-linejoin="round"/>
  <path d="M282,210 L308,310 L356,268" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.12" stroke-linejoin="round"/>

  <!-- Crown base band -->
  <rect x="142" y="344" width="228" height="42" rx="11" fill="url(#base-grad)"/>
  <!-- Base highlight strip -->
  <rect x="142" y="344" width="228" height="10" rx="11" fill="white" opacity="0.16"/>
  <!-- Base bottom shadow -->
  <rect x="142" y="376" width="228" height="10" rx="11" fill="#1e1b4b" opacity="0.5"/>

  <!-- Notch engravings on base (circuit-board motif) -->
  <rect x="168" y="357" width="20" height="4" rx="2" fill="white" opacity="0.22"/>
  <rect x="200" y="357" width="12" height="4" rx="2" fill="white" opacity="0.22"/>
  <rect x="224" y="357" width="20" height="4" rx="2" fill="white" opacity="0.22"/>
  <rect x="256" y="357" width="12" height="4" rx="2" fill="white" opacity="0.22"/>
  <rect x="280" y="357" width="20" height="4" rx="2" fill="white" opacity="0.22"/>
  <rect x="312" y="357" width="16" height="4" rx="2" fill="white" opacity="0.22"/>

  <!-- Gem: left peak -->
  <circle cx="230" cy="206" r="13" fill="#f472b6" filter="url(#glow-f)"/>
  <circle cx="230" cy="206" r="7" fill="white" opacity="0.5"/>

  <!-- Gem: center peak (tallest, largest) -->
  <circle cx="256" cy="275" r="0"/>
  <!-- Crown tip jewel -->
  <circle cx="256" cy="190" r="0"/>

  <!-- Gem: right peak -->
  <circle cx="282" cy="206" r="13" fill="#fbbf24" filter="url(#glow-f)"/>
  <circle cx="282" cy="206" r="7" fill="white" opacity="0.5"/>

  <!-- Center gem (valley, accent color) -->
  <circle cx="256" cy="274" r="9" fill="#38bdf8" filter="url(#glow-f)"/>
  <circle cx="256" cy="274" r="4.5" fill="white" opacity="0.55"/>

  <!-- Decorative stars (background) -->
  <circle cx="152" cy="142" r="3" fill="white" opacity="0.55"/>
  <circle cx="360" cy="128" r="2.5" fill="white" opacity="0.45"/>
  <circle cx="388" cy="210" r="2" fill="white" opacity="0.35"/>
  <circle cx="126" cy="218" r="2" fill="white" opacity="0.35"/>
  <circle cx="195" cy="118" r="1.8" fill="white" opacity="0.4"/>
  <circle cx="330" cy="148" r="1.5" fill="white" opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Tower fill: dark amber → bright gold → cream at peak -->
    <linearGradient id="ic-tg" gradientUnits="userSpaceOnUse" x1="76" y1="346" x2="76" y2="152">
      <stop offset="0%"   stop-color="#B87A0A"/>
      <stop offset="40%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#FFF4A3"/>
    </linearGradient>
    <!-- Tower highlight: left-edge bevel -->
    <linearGradient id="ic-th" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Gold outer ring: bright top, deepens at sides -->
    <linearGradient id="ic-rg" gradientUnits="userSpaceOnUse" x1="256" y1="101" x2="256" y2="415">
      <stop offset="0%"   stop-color="#FFF4A3"/>
      <stop offset="45%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#C8890A"/>
    </linearGradient>
    <!-- Teal bottom arc -->
    <linearGradient id="ic-tr" gradientUnits="userSpaceOnUse" x1="256" y1="355" x2="256" y2="418">
      <stop offset="0%"   stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#1E8A83"/>
    </linearGradient>
    <!-- Teal base fill inside disc -->
    <linearGradient id="ic-tb" gradientUnits="userSpaceOnUse" x1="256" y1="346" x2="256" y2="409">
      <stop offset="0%"   stop-color="#2A9D8F" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0C3D3A"/>
    </linearGradient>
    <!-- Inner atmosphere glow -->
    <radialGradient id="ic-ia" cx="50%" cy="85%" r="38%">
      <stop offset="0%"   stop-color="#4ECDC4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <!-- Background: deep navy -->
    <radialGradient id="ic-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#0A1525"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <!-- Subtle gold aurora on background -->
    <radialGradient id="ic-au" cx="50%" cy="40%" r="42%">
      <stop offset="0%"   stop-color="#F5C842" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to inner disc -->
    <clipPath id="ic-cc">
      <circle cx="256" cy="256" r="144"/>
    </clipPath>
    <!-- Tower glow filter -->
    <filter id="ic-gf" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#ic-bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#ic-au)"/>
  <!-- Gold border ring -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#F5C842" stroke-width="6" stroke-opacity="0.30"/>

  <!-- Accent dots in corners for polish -->
  <circle cx="90"  cy="90"  r="3"   fill="#F5C842" opacity="0.25"/>
  <circle cx="422" cy="90"  r="2.5" fill="#F5C842" opacity="0.20"/>
  <circle cx="90"  cy="422" r="2"   fill="#4ECDC4" opacity="0.18"/>
  <circle cx="422" cy="422" r="3"   fill="#4ECDC4" opacity="0.22"/>

  <!-- === MEDALLION === -->

  <!-- Dark base disc (two layers for depth) -->
  <circle cx="256" cy="256" r="167" fill="#04080F"/>
  <circle cx="256" cy="256" r="162" fill="#060C1A"/>

  <!-- Teal base fill — bottom portion, clipped to inner circle -->
  <rect x="105" y="346" width="302" height="72" fill="url(#ic-tb)" clip-path="url(#ic-cc)"/>

  <!-- Teal atmosphere glow from bottom -->
  <circle cx="256" cy="256" r="144" fill="url(#ic-ia)"/>

  <!-- 5 towers with gold glow -->
  <g filter="url(#ic-gf)" clip-path="url(#ic-cc)">
    <!-- T1 — far left, short -->
    <rect x="171" y="251" width="23" height="95"  rx="3" fill="url(#ic-tg)"/>
    <rect x="171" y="251" width="7"  height="95"  rx="3" fill="url(#ic-th)"/>
    <!-- T2 — left-center, medium -->
    <rect x="200" y="207" width="27" height="139" rx="3" fill="url(#ic-tg)"/>
    <rect x="200" y="207" width="9"  height="139" rx="3" fill="url(#ic-th)"/>
    <!-- T3 — center, tallest -->
    <rect x="233" y="159" width="36" height="187" rx="4" fill="url(#ic-tg)"/>
    <rect x="233" y="159" width="11" height="187" rx="4" fill="url(#ic-th)"/>
    <!-- T4 — right-center, medium -->
    <rect x="276" y="218" width="25" height="128" rx="3" fill="url(#ic-tg)"/>
    <rect x="276" y="218" width="7"  height="128" rx="3" fill="url(#ic-th)"/>
    <!-- T5 — far right, short -->
    <rect x="308" y="263" width="22" height="83"  rx="3" fill="url(#ic-tg)"/>
    <rect x="308" y="263" width="7"  height="83"  rx="3" fill="url(#ic-th)"/>
  </g>

  <!-- Gold outer ring — top 270° (large arc, counterclockwise) -->
  <!-- Endpoints (146,366) and (366,366) are at radius≈155 from center (256,256) -->
  <path d="M 146,366 A 155,155 0 1,0 366,366"
        fill="none" stroke="url(#ic-rg)" stroke-width="18" stroke-linecap="round"/>

  <!-- Teal bottom arc — bottom 90° (small arc, clockwise) -->
  <path d="M 146,366 A 155,155 0 0,1 366,366"
        fill="none" stroke="url(#ic-tr)" stroke-width="18" stroke-linecap="round"/>

  <!-- Circuit node at tower base -->
  <line x1="184" y1="346" x2="328" y2="346" stroke="#2A9D8F" stroke-width="2.5" opacity="0.65"/>
  <line x1="256" y1="346" x2="256" y2="364" stroke="#2A9D8F" stroke-width="2.5" opacity="0.55"/>
  <line x1="188" y1="346" x2="177" y2="335" stroke="#2A9D8F" stroke-width="2"   opacity="0.4"/>
  <line x1="324" y1="346" x2="335" y2="335" stroke="#2A9D8F" stroke-width="2"   opacity="0.4"/>
  <circle cx="211" cy="346" r="4.5" fill="#4ECDC4" opacity="0.85"/>
  <circle cx="301" cy="346" r="4.5" fill="#4ECDC4" opacity="0.85"/>
  <circle cx="256" cy="346" r="10"  fill="#F5C842" stroke="#2A9D8F" stroke-width="2.5"/>
  <circle cx="256" cy="346" r="4.5" fill="#FFF8D0"/>

  <!-- Subtle inner ring accent -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#F5C842" stroke-width="1" opacity="0.12"/>
</svg>
